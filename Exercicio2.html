<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Paginas utilizando forms</title>
    <link rel="stylesheet" href="Exercicio2.css">
</head>
<body>
    <main>
        <div id="formulario">
            <form action="">
                <section>
                    <fieldset>
                        <legend>Informação pessoal do aluno</legend>
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" name="nome" required size="30" maxlength="50" pattern="[a-zA-Z]{1,50}" autofocus/>
                        <br>
                        <br>
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email">
                        <br>
                        <br>
                        <label>Sexo</label>
                        <br>
                        <input type="radio" id="masculino" name="sexo" value="M" checked>
                        <label>Masculino</label>
                        <input type="radio" id="feminino" name="sexo" value="F">
                        <label>Feminino</label>
                        <input type="radio" id="outro" name="sexo" value="O">
                        <label>Outro</label>
                        <br>
                        <br>
                        <label>Passatempo:</label>
                        <br>
                        <input type="checkbox" id="passatempo1" name="passatempos" value="ler">
                        <label>Ler</label>
                        <input type="checkbox" id="passatempo2" name="passatempos" value="esporte">
                        <label>Praticar esporte</label>
                        <input type="checkbox" id="passatempo3" name="passatempos" value="dormir">
                        <label>Dormir</label>
                        <input type="checkbox" id="passatempo4" name="passatempos" value="jogar">
                        <label>Jogar</label>
                        <p>
                            <label>Cor Favorita</label>
                            <input type="color" id="cor" name="cor" value="#ff0000">
                            <label>Vermelho</label>
                        </p>
                        <br>
                        <br>
                        <input type="submit" value="enviar">
                        <button type="reset">Limpar</button>
                    </fieldset>
                    <br>
                    <br>
                    <fieldset>
                        <legend>Deixe aqui alguma informação necessaria</legend>
                        <label>Mensagem</label>
                        <textarea name="mensagem" id="mensagem" cols="50" rows="5" placeholder="vazio"></textarea>
                        <br>
                        <br>
                        <label>País</label>
                        <select name="pais" id="pais">
                            <option value="">Selecione</option>
                            <option value="brasil">Brasil</option>
                            <option value="eua">Eua</option>
                            <option value="portugal">Portugal</option>
                            <option value="espanha">Espanha</option>
                        </select>
                        <br>
                        <br>
                        <button type="button">Cancelar</button>
                    </fieldset>
                </section>
            </form>
        </div>
    </main>
    <footer class="rodape">Pagina criada 09/03
    </footer>
</body>
</html>
